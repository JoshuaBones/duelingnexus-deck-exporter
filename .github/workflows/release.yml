name: Release with ZIP

on:
  workflow_dispatch:

jobs:
  create-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Read version from manifest.json
        id: manifest
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create ZIP file
        run: |
          zip -r DnX-Exporter-v${{ steps.manifest.outputs.version }}.zip . \
            -x "*.git*" ".github/*" "node_modules/*" \
            "images/*" "internal_tools/*" ".gitignore"
          
      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: DnX-Exporter-v${{ steps.manifest.outputs.version }}.zip
          tag_name: v${{ steps.manifest.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
